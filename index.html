<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dijital Modülasyon Görselleştirici</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
    <!-- Header -->
    <div class="card header-card">
        <h1>Dijital Modülasyon Görselleştirici</h1>
        <p class="subtitle">ASK · FSK · PSK · QAM — Sembol eşleme, constellation diyagramı ve dalga formu</p>
    </div>

    <!-- Input Card -->
    <div class="card">
        <h2>Giriş Parametreleri</h2>
        <div class="input-grid">
            <div class="input-group">
                <label for="bitInput">Bit Dizisi</label>
                <input type="text" id="bitInput" placeholder="Örn: 10110010" autocomplete="off" spellcheck="false">
            </div>
            <div class="input-group">
                <label for="modType">Modülasyon Tipi</label>
                <select id="modType">
                    <option value="ASK">ASK (Amplitude Shift Keying)</option>
                    <option value="FSK">FSK (Frequency Shift Keying)</option>
                    <option value="PSK" selected>PSK (Phase Shift Keying)</option>
                    <option value="QAM">QAM (Quadrature Amplitude Modulation)</option>
                </select>
            </div>
            <div class="input-group">
                <label for="modLevel">Seviye (M)</label>
                <select id="modLevel">
                    <option value="2">2</option>
                    <option value="4">4</option>
                    <option value="8" selected>8</option>
                    <option value="16">16</option>
                </select>
            </div>
            <div class="input-group btn-group">
                <button class="btn btn-draw" id="btnDraw">Çiz</button>
            </div>
        </div>
        <div id="errorMsg" class="error-msg" style="display:none;"></div>
    </div>

    <!-- Results Section -->
    <div id="resultsSection" style="display:none;">

        <!-- Info Banner -->
        <div class="card info-card" id="infoBanner">
            <div class="info-grid" id="infoGrid"></div>
        </div>

        <!-- Table + Constellation Row -->
        <div class="table-constellation-row">
            <!-- Symbol Mapping Table -->
            <div class="card">
                <h2>Sembol Eşleme Tablosu</h2>
                <div class="table-container">
                    <table id="mappingTable">
                        <thead id="tableHead"></thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
            <!-- Constellation -->
            <div class="card chart-card">
                <h2>Constellation (Takımyıldızı) Diyagramı</h2>
                <div id="constellationPlot" class="plot-container"></div>
            </div>
        </div>

        <!-- Waveform -->
        <div class="card chart-card">
            <h2>Zaman Domeni Dalga Formu</h2>
            <div id="waveformPlot" class="plot-container plot-wide"></div>
        </div>
    </div>
</div>

<script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
<script src="js/modulations.js"></script>
<script src="js/charts.js"></script>
<script src="js/app.js"></script>
</body>
</html>
